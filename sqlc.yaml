version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations/"
    queries: "queries/"
    gen:
      go:
        package: "queries"
        out: "app/queries"
        emit_json_tags: true
        overrides:
          - db_type: "DATETIME"
            go_type:
              type: "time.Time"
          - column: "users.password"
            go_type:
              import: "database/sql"
              type: "NullString"
          - column: "users.google_id"
            go_type:
              import: "database/sql"
              type: "NullString"
          - column: "users.district_id"
            go_type:
              import: "database/sql"
              type: "NullInt64"
          - column: "users.volunteer_id"
            go_type:
              import: "database/sql"
              type: "NullInt64"
          - column: "users.is_active"
            go_type:
              type: "bool"
